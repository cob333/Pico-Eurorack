name: Deploy client to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - Client/**
      - images/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R Client _site/Client
          cp -R images _site/images
          python3 Client/scripts/export_manifest.py --output _site/Client/manifest.json
          touch _site/.nojekyll
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=./Client/">
            <title>Pico-Eurorack Client</title>
          </head>
          <body>
            <a href="./Client/">Open Pico-Eurorack Client</a>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
