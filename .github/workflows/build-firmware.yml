name: Build bundled UF2

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: External request id created by Cloudflare Worker
        required: true
      device:
        description: Target device family
        required: true
        default: pico
        type: choice
        options:
          - pico
          - picofx
      slots:
        description: Comma-separated app ids, for example TripleOSC,Plaits,Rings
        required: true
        default: TripleOSC
      active:
        description: Zero-based active slot index
        required: true
        default: "0"
      sample_key:
        description: Optional R2 object key for uploaded sample bundle
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.event.inputs.request_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ARDUINO_CORE_VERSION: 5.5.0
      PICO_BOARD: pico2
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build revision
        run: |
          echo "Pico-Eurorack CI library fix marker: 2026-05-14-neopixel-in-sketches-lib"
          git rev-parse HEAD
          git status --short
          nl -ba Client/scripts/github_action_build.py | sed -n '80,115p'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino-Pico core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set directories.user "$GITHUB_WORKSPACE/.arduino"
          arduino-cli config add board_manager.additional_urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index
          arduino-cli core install "rp2040:rp2040@${ARDUINO_CORE_VERSION}"

      - name: Install Arduino libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Adafruit NeoPixel@1.12.5"
          git clone https://github.com/rheslip/DaisySP_Teensy.git "$RUNNER_TEMP/DaisySP_Teensy"
          git -C "$RUNNER_TEMP/DaisySP_Teensy" checkout 002bcbfc7f8a7e7305954b38c2bbbf12a2bd845e
          cp -R "$RUNNER_TEMP/DaisySP_Teensy/DaisySP" "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP"
          cp -R "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP/Utility" "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP/utility"
          test -f "$GITHUB_WORKSPACE/.arduino/libraries/Adafruit_NeoPixel/Adafruit_NeoPixel.h"
          test -f "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP/daisysp.h"
          test -f "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP/utility/dsp.h"
          test -f "$GITHUB_WORKSPACE/.arduino/libraries/DaisySP/Synthesis/oscillator.cpp"
          arduino-cli lib list

      - name: Build UF2
        run: |
          ARDUINO_PICO_ROOT="$HOME/.arduino15/packages/rp2040/hardware/rp2040/${ARDUINO_CORE_VERSION}"
          export PICO_SDK_PATH="${ARDUINO_PICO_ROOT}/pico-sdk"
          export PATH="$HOME/.arduino15/packages/rp2040/tools/pqt-gcc/4.1.0-1aec55e/bin:$PATH"
          find "$GITHUB_WORKSPACE/.arduino/libraries" -maxdepth 3 \( -name 'Adafruit_NeoPixel.h' -o -name 'daisysp.h' -o -name 'dsp.h' -o -name 'oscillator.cpp' \) -print
          python3 Client/scripts/github_action_build.py \
            --request-id "${{ inputs.request_id }}" \
            --device "${{ inputs.device }}" \
            --slots "${{ inputs.slots }}" \
            --active "${{ inputs.active }}" \
            --sample-key "${{ inputs.sample_key }}" \
            --output-dir dist/firmware

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-eurorack-${{ inputs.request_id }}
          path: dist/firmware
          retention-days: 3

      - name: Upload UF2 to Cloudflare R2
        if: ${{ env.R2_ACCOUNT_ID != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' && env.R2_BUCKET != '' }}
        run: |
          python3 -m pip install --user awscli
          export PATH="$HOME/.local/bin:$PATH"
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws --endpoint-url "$ENDPOINT" s3 cp dist/firmware/ "s3://${R2_BUCKET}/outputs/${{ inputs.request_id }}/" --recursive

      - name: Publish build summary
        run: |
          {
            echo "## Pico-Eurorack UF2"
            echo
            echo "- Request: \`${{ inputs.request_id }}\`"
            echo "- Device: \`${{ inputs.device }}\`"
            echo "- Slots: \`${{ inputs.slots }}\`"
            echo "- Active slot: \`${{ inputs.active }}\`"
            echo
            echo "Download the generated .uf2 from R2 through the Worker, or from this workflow artifact."
          } >> "$GITHUB_STEP_SUMMARY"
