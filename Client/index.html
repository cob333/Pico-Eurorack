<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico-Eurorack Client</title>
  <style>
    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-400-Book.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-500-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-700-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-solid: #ffffff;
      --surface-soft: rgba(250, 250, 252, 0.88);
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(60, 60, 67, 0.16);
      --line-strong: rgba(60, 60, 67, 0.28);
      --accent: #5f6368;
      --accent-strong: #2f3134;
      --accent-soft: rgba(95, 99, 104, 0.1);
      --danger: #d70015;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --column-height: clamp(520px, calc(100vh - 196px), 650px);
      font-family: "Jost", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(60, 60, 67, 0.07) 1px, transparent 1px),
        linear-gradient(0deg, rgba(60, 60, 67, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(60, 60, 67, 0.12) 1px, transparent 1px),
        linear-gradient(0deg, rgba(60, 60, 67, 0.12) 1px, transparent 1px),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 56%, #eceef2 100%),
        var(--bg);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px, auto, auto;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      color: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .app.generating .workspace {
      filter: saturate(0.62) opacity(0.42);
      pointer-events: none;
      user-select: none;
    }

    .build-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      background: rgba(247, 248, 250, 0.72);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
    }

    .app.generating .build-overlay {
      display: grid;
    }

    .site-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      gap: 6px;
      padding: 18px 24px 24px;
      border-top: 1px solid rgba(60, 60, 67, 0.12);
      background: #ffffff;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      text-align: center;
      opacity: var(--footer-progress, 0);
      pointer-events: none;
      transform: translateY(calc((1 - var(--footer-progress, 0)) * 100%));
      transition: opacity 0.08s linear, transform 0.08s linear;
      will-change: opacity, transform;
    }

    .footer-reveal-space {
      height: 118px;
    }

    .site-footer img {
      display: block;
      width: min(80px, 42vw);
      height: auto;
      object-fit: contain;
    }

    .build-progress {
      width: min(520px, calc(100vw - 40px));
      display: grid;
      gap: 12px;
    }

    .build-progress-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      color: var(--ink);
      font-weight: 700;
    }

    .build-progress-head span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .build-progress-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px;
      gap: 12px;
      align-items: center;
    }

    .build-progress-track {
      height: 12px;
      overflow: hidden;
      border: 1px solid rgba(60, 60, 67, 0.16);
      border-radius: 999px;
      background: rgba(118, 118, 128, 0.16);
    }

    .build-progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #000000;
      transition: width 0.18s ease;
    }

    .build-cancel {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(60, 60, 67, 0.16);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
    }

    .build-cancel:hover,
    .build-cancel:focus-visible {
      border-color: rgba(215, 0, 21, 0.28);
      background: #fff1f2;
      color: var(--danger);
      outline: none;
    }

    .workspace {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 86px auto 1fr;
      max-width: 1680px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid rgba(60, 60, 67, 0.12);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 140px;
      height: 54px;
      border-radius: 10px;
      object-fit: cover;
      flex: none;
    }

    .brand h1 {
      margin: 0;
      font-size: 32px;
      white-space: nowrap;
      font-weight: 700;
      line-height: 1.12;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
      display: block;
      margin-top: 3px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-chip {
      min-width: 92px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .status-chip.error {
      color: var(--danger);
    }

    .generate-button {
      border: 0;
      border-radius: 999px;
      min-height: 36px;
      padding: 0 18px;
      background: linear-gradient(180deg, #979797 0%, var(--accent) 100%);
      color: #ffffff;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(60, 60, 67, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease, background 0.18s ease;
    }

    .generate-button.ready {
      background: linear-gradient(180deg, #42d27a 0%, #168f45 100%);
      box-shadow: 0 8px 20px rgba(22, 143, 69, 0.24);
    }

    .generate-button.blocked {
      background: linear-gradient(180deg, #b8bcc2 0%, #7f858d 100%);
      box-shadow: none;
    }

    .generate-button:disabled {
      cursor: not-allowed;
      opacity: 0.68;
      transform: none;
      box-shadow: none;
    }

    .generate-button:not(:disabled):hover,
    .generate-button:not(:disabled):focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(60, 60, 67, 0.28);
      filter: saturate(1.08);
      outline: none;
    }

    .generate-button.ready:not(:disabled):hover,
    .generate-button.ready:not(:disabled):focus-visible {
      box-shadow: 0 14px 28px rgba(22, 143, 69, 0.3);
    }

    .slot-bar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      gap: 14px;
      align-items: center;
      margin: 16px 24px 0;
      padding: 14px;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.66);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
      box-shadow: var(--shadow);
    }

    .slot-bar h2 {
      grid-column: 1;
      grid-row: 1;
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .device-switch,
    .page-tabs {
      position: relative;
      display: flex;
      border: 1px solid rgba(60, 60, 67, 0.14);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(118, 118, 128, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      padding: 3px;
      --slider-x: 3px;
      --slider-width: 0px;
    }

    .device-switch::before,
    .page-tabs::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 0;
      width: var(--slider-width);
      height: calc(100% - 6px);
      border-radius: 999px;
      background: var(--surface-solid);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      transform: translateX(var(--slider-x));
      transition: transform 0.24s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .device-switch button,
    .page-tabs button {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      border: 0;
      background: transparent;
      min-height: 32px;
      padding: 0 15px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 500;
      transition: color 0.18s ease;
    }

    .device-switch button.active,
    .page-tabs button.active {
      color: var(--ink);
    }

    .page-tabs {
      margin-top: 14px;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      scroll-behavior: smooth;
      white-space: nowrap;
    }

    .page-tabs::-webkit-scrollbar {
      display: none;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(340px, 1fr) minmax(112px, 160px) minmax(340px, 1fr);
      gap: 20px;
      padding: 20px 24px 28px;
      align-items: stretch;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 14px;
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
      height: var(--column-height);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .details {
      overflow: visible;
    }

    .details .panel-body {
      overflow: visible;
    }

    .panel-head {
      padding: 15px 16px 13px;
      border-bottom: 1px solid rgba(60, 60, 67, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255, 255, 255, 0.48);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
      text-transform: uppercase;
      font-weight: 700;
    }

    .panel-body {
      padding: 16px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .catalog-search {
      width: 100%;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 999px;
      min-height: 40px;
      padding: 0 15px;
      margin-bottom: 14px;
      background: rgba(118, 118, 128, 0.1);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .catalog-search:focus {
      border-color: rgba(95, 99, 104, 0.48);
      background: var(--surface-solid);
      box-shadow: 0 0 0 4px rgba(95, 99, 104, 0.12);
    }

    .app-list {
      display: grid;
      gap: 8px;
      padding-right: 4px;
    }

    .app-card-wrap {
      position: relative;
      display: grid;
    }

    .app-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px 10px;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      padding: 11px 40px 11px 12px;
      text-align: left;
      user-select: none;
      will-change: transform;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .app-card-wrap.has-sample-settings .app-card {
      padding-right: 90px;
    }

    .app-card:hover {
      border-color: rgba(95, 99, 104, 0.24);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
      background: var(--surface-solid);
    }

    .app-card.active {
      border-color: rgba(95, 99, 104, 0.38);
      background: linear-gradient(180deg, #ffffff 0%, rgba(95, 99, 104, 0.07) 100%);
      box-shadow: inset 3px 0 0 var(--accent), 0 12px 28px rgba(60, 60, 67, 0.12);
    }

    .app-card[draggable="true"] {
      cursor: grab;
    }

    .app-card[draggable="true"]:active {
      cursor: grabbing;
    }

    .app-card.dragging {
      opacity: 0.56;
      transform: scale(0.99);
    }

    .app-card strong {
      font-size: 16px;
      line-height: 1.18;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .app-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.48;
    }

    .app-card::after {
      content: "";
      position: absolute;
      top: 13px;
      right: 12px;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background:
        radial-gradient(circle, var(--line-strong) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }

    .app-card.active::after {
      background:
        radial-gradient(circle, var(--accent) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }

    .sample-settings {
      position: absolute;
      top: 9px;
      right: 40px;
      z-index: 2;
      min-height: 26px;
      border: 1px solid rgba(60, 60, 67, 0.14);
      border-radius: 999px;
      padding: 0 9px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 500;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .sample-settings:hover,
    .sample-settings:focus-visible {
      border-color: rgba(95, 99, 104, 0.38);
      background: #ffffff;
      transform: translateY(-1px);
      outline: none;
    }

    .app-card.in-slot::after {
      content: "\2713";
      display: grid;
      place-items: center;
      border: 1px solid rgba(95, 99, 104, 0.42);
      border-radius: 50%;
      background: var(--surface-solid);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .empty-state {
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      padding: 18px 14px;
      color: var(--muted);
      background: var(--surface-soft);
      text-align: center;
      font-size: 13px;
    }

    .sample-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(245, 245, 247, 0.78);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .sample-modal.open {
      display: grid;
    }

    .sample-dialog {
      width: min(760px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border: 1px solid rgba(60, 60, 67, 0.14);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.16);
    }

    .sample-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(60, 60, 67, 0.12);
    }

    .sample-dialog-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .sample-dialog-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .sample-close {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(60, 60, 67, 0.16);
      border-radius: 50%;
      background: #ffffff;
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
    }

    .sample-uploader {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(180px, 1.4fr);
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid rgba(60, 60, 67, 0.12);
      background: rgba(250, 250, 252, 0.86);
    }

    .sample-uploader input {
      min-height: 38px;
      min-width: 0;
      border: 1px solid rgba(60, 60, 67, 0.14);
      border-radius: 10px;
      padding: 0 10px;
      background: #ffffff;
    }

    .sample-upload-button {
      grid-column: 1 / -1;
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      background: #1d1d1f;
      color: #ffffff;
      font-weight: 500;
    }

    .sample-upload-button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .sample-content {
      min-height: 0;
      overflow: auto;
      padding: 18px 20px 20px;
    }

    .sample-status {
      min-height: 20px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .sample-status.error {
      color: var(--danger);
    }

    .sample-bank-list {
      display: grid;
      gap: 10px;
    }

    .sample-bank {
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 12px;
      padding: 12px;
      background: rgba(250, 250, 252, 0.78);
    }

    .sample-bank-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .sample-bank-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .sample-bank-head strong {
      font-size: 15px;
    }

    .sample-bank-head span,
    .sample-file-list {
      color: var(--muted);
      font-size: 12px;
    }

    .sample-file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      line-height: 1.4;
    }

    .sample-file-pill {
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 999px;
      padding: 4px 8px;
      background: #ffffff;
    }

    .sample-delete-bank {
      border: 1px solid rgba(215, 0, 21, 0.18);
      border-radius: 999px;
      min-height: 26px;
      padding: 0 10px;
      background: rgba(255, 59, 48, 0.08);
      color: var(--danger);
      font-size: 12px;
      font-weight: 500;
    }

    .sample-delete-bank:hover,
    .sample-delete-bank:focus-visible {
      border-color: rgba(215, 0, 21, 0.36);
      background: #ffe7ea;
      outline: none;
    }

    .slots {
      display: grid;
      grid-column: 2;
      grid-row: 1;
      grid-template-columns: repeat(6, minmax(126px, 1fr));
      gap: 10px;
      min-width: 0;
    }

    .slot-usage {
      grid-column: 2;
      grid-row: 2;
      display: grid;
      grid-template-columns: minmax(180px, 1150px) auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .usage-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(118, 118, 128, 0.16);
      border: 1px solid rgba(60, 60, 67, 0.12);
    }

    .usage-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #000000;
      transition: width 0.18s ease;
    }

    .usage-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .slot-actions {
      grid-column: 3;
      grid-row: 1 / span 2;
      min-width: 96px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      align-self: stretch;
    }

    .slot-trash,
    .slot-clear {
      border: 1px solid rgba(215, 0, 21, 0.16);
      border-radius: 12px;
      background: rgba(255, 59, 48, 0.08);
      color: var(--danger);
      display: grid;
      place-items: center;
      padding: 8px 10px;
      text-align: center;
      user-select: none;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .slot-trash {
      align-self: stretch;
    }

    .slot-trash-label,
    .slot-clear-all {
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .slot-clear {
      cursor: pointer;
    }

    .slot-clear-all {
      border: 0;
      background: transparent;
      color: inherit;
      min-height: auto;
      padding: 0;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .slot-clear:hover,
    .slot-clear:focus-within,
    .slot-clear-all:hover,
    .slot-clear-all:focus-visible {
      background: #ffe7ea;
      border-color: rgba(215, 0, 21, 0.32);
      color: #b00013;
      transform: translateY(-1px);
      outline: none;
      box-shadow: 0 14px 30px rgba(215, 0, 21, 0.16), 0 0 0 4px rgba(215, 0, 21, 0.08);
    }

    .slot-trash.drag-over {
      border-color: rgba(215, 0, 21, 0.38);
      background: #ffe2e6;
      box-shadow: 0 16px 36px rgba(215, 0, 21, 0.22), 0 0 0 4px rgba(215, 0, 21, 0.12);
      transform: translateY(-1px);
    }

    .slot-empty {
      color: #98a2ad;
    }

    .slot-index.empty {
      background: #a8b1bb;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto 18px;
      gap: 7px;
      align-items: center;
      min-height: 42px;
      padding: 6px 9px;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.64);
      user-select: none;
      will-change: transform;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
    }

    .slot-row strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-row:hover {
      border-color: rgba(95, 99, 104, 0.28);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(60, 60, 67, 0.1);
      transform: translateY(-1px);
    }

    .slot-row.drag-over {
      border-color: rgba(95, 99, 104, 0.38);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 36px rgba(60, 60, 67, 0.14), 0 0 0 4px rgba(95, 99, 104, 0.1);
    }

    .app-dragging .slot-row,
    .slot-dragging .slot-row {
      border-color: rgba(60, 60, 67, 0.2);
      background: rgba(255, 255, 255, 0.76);
    }

    .slot-row.active {
      border-color: rgba(95, 99, 104, 0.42);
      background: var(--surface-solid);
      box-shadow: 0 10px 24px rgba(60, 60, 67, 0.12), 0 0 0 3px rgba(95, 99, 104, 0.08);
    }

    .slot-row.active:hover {
      border-color: rgba(95, 99, 104, 0.52);
      box-shadow: 0 14px 30px rgba(60, 60, 67, 0.14), 0 0 0 3px rgba(95, 99, 104, 0.1);
    }

    .app-dragging .slot-row.drag-over,
    .slot-dragging .slot-row.drag-over,
    .slot-row.active.drag-over {
      border-color: rgba(95, 99, 104, 0.42);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 36px rgba(60, 60, 67, 0.14), 0 0 0 4px rgba(95, 99, 104, 0.1);
    }

    .slot-row[draggable="true"] {
      cursor: grab;
    }

    .slot-row[draggable="true"]:active {
      cursor: grabbing;
    }

    .slot-row.dragging {
      opacity: 0.56;
      transform: scale(0.99);
    }

    .slot-index {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(180deg, #636366 0%, #3a3a3c 100%);
      font-weight: 700;
      font-size: 12px;
    }

    .slot-index.orange {
      background: linear-gradient(180deg, #ff9f0a 0%, #c75f00 100%);
    }

    .slot-index.yellow {
      background: linear-gradient(180deg, #ffd60a 0%, #c99a00 100%);
    }

    .slot-index.tiffany {
      background: linear-gradient(180deg, #5de4d9 0%, #0abab5 100%);
    }

    .slot-index.aqua {
      background: linear-gradient(180deg, #64d2ff 0%, #0096d6 100%);
    }

    .slot-index.blue {
      background: linear-gradient(180deg, #5e9bff 0%, #2458d3 100%);
    }

    .slot-index.violet {
      background: linear-gradient(180deg, #bf8cff 0%, #6c3ecf 100%);
    }

    .slot-size {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      justify-self: end;
    }

    .drag-handle {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background:
        radial-gradient(circle, var(--line-strong) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
      opacity: 0;
      transition: opacity 0.18s ease, background 0.18s ease;
    }

    .slot-row[draggable="true"] .drag-handle {
      opacity: 1;
    }

    .slot-row.active .drag-handle {
      background:
        radial-gradient(circle, var(--accent) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }


    .preview {
      display: grid;
      place-items: start center;
      justify-self: center;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 12px 8px;
      height: var(--column-height);
      min-height: 0;
      max-height: var(--column-height);
      overflow: hidden;
      box-shadow: none;
    }

    .module {
      position: relative;
      width: min(130px, 13vw);
      min-width: 88px;
      justify-self: center;
      margin-inline: auto;
      --focus-x: 50%;
      --focus-y: 50%;
      --focus-scale: 1;
    }

    .module img {
      width: 100%;
      max-height: calc(var(--column-height) - 16px);
      display: block;
      object-fit: contain;
      object-position: top center;
      filter: drop-shadow(0 26px 38px rgba(0, 0, 0, 0.2));
      transform: scale(var(--focus-scale));
      transform-origin: var(--focus-x) var(--focus-y);
      transition: transform 0.24s ease, transform-origin 0.24s ease, filter 0.24s ease;
    }

    .module.focusing img {
      filter: drop-shadow(0 30px 46px rgba(0, 0, 0, 0.26));
    }

    .selected-title {
      display: grid;
      gap: 6px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(60, 60, 67, 0.12);
    }

    .selected-title h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 700;
    }

    .selected-title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .chip {
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.62);
    }

    .chip.live {
      color: var(--accent);
      border-color: rgba(95, 99, 104, 0.34);
      background: var(--accent-soft);
    }

    .function-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .function-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 12px;
      padding: 11px 12px;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.64);
      align-items: start;
      overflow: visible;
      transition: transform 0.18s ease;
    }

    .function-row:hover {
      transform: scale(1.018);
    }

    .function-row::before {
      content: "\2190";
      position: absolute;
      top: -1px;
      left: 0;
      display: grid;
      place-items: center;
      width: 40px;
      height: calc(100%);
      border: 1px solid rgba(95, 99, 104, 0.82);
      border-radius: 10px 0 0 10px;
      background: linear-gradient(180deg, #7b7f85 0%, var(--accent) 100%);
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
      opacity: 0;
      z-index: -1;
      transform: translate(0, 0);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.22s ease, box-shadow 0.18s ease;
    }

    .function-row:hover::before {
      opacity: 1;
      transform: translate(-30px, 0);
    }

    .function-row b {
      width: fit-content;
      max-width: 100%;
      border: 1px solid rgba(60, 60, 67, 0.12);
      border-radius: 999px;
      padding: 3px 7px;
      margin-left: 10px;
      background: rgba(255, 255, 255, 0.86);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #3a3a3c;
    }

    .function-row span {
      color: #30353b;
      line-height: 1.45;
      font-size: 14px;
    }

    @media (max-width: 1180px) {
      .slot-bar {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .slot-usage {
        grid-column: 2;
      }

      .slot-actions {
        grid-column: 3;
        grid-row: 1 / span 2;
      }
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: minmax(280px, 1fr) minmax(96px, 126px);
      }

      .details {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .main,
      .slot-bar {
        width: 100%;
      }

      .workspace {
        grid-template-rows: auto auto 1fr;
      }

      .slot-bar {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        margin: 12px;
        padding: 12px;
      }

      .slot-bar h2 {
        grid-column: 1;
        grid-row: auto;
      }

      .slot-usage {
        grid-column: 1;
        grid-row: auto;
      }

      .slot-actions {
        grid-column: 1;
        grid-row: auto;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
      }

      .slot-trash {
        min-height: 48px;
      }

      .slots {
        grid-column: 1;
        grid-row: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        height: auto;
        min-height: 64px;
        align-items: flex-start;
        padding: 12px;
        flex-direction: column;
      }

      .brand h1 {
        font-size: 28px;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .status-chip {
        order: 3;
        width: 100%;
        text-align: left;
      }

      .generate-button {
        flex: none;
      }

      .device-switch {
        width: 100%;
      }

      .device-switch button {
        flex: 1;
      }

      .main {
        grid-template-columns: 1fr;
        padding: 14px 12px 18px;
      }

      .module {
        width: min(132px, 38vw);
        margin: 0 auto;
      }

      .panel,
      .preview {
        height: auto;
        min-height: auto;
        max-height: none;
      }

      .module img {
        max-height: 320px;
      }

      .function-row {
        grid-template-columns: 76px minmax(0, 1fr);
      }
    }

    @media (max-width: 520px) {
      .brand h1 {
        font-size: 24px;
        white-space: normal;
      }

      .slot-usage {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .usage-label {
        white-space: normal;
      }

      .slots {
        grid-template-columns: 1fr;
      }

      .slot-row {
        grid-template-columns: 28px minmax(0, 1fr) auto 18px;
      }

      .selected-title h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="workspace" id="workspace">
      <header class="topbar">
        <div class="brand">
          <img class="mark" src="../images/Pico_Icon.jpg" alt="" aria-hidden="true">
          <div>
            <h1>Workshop</h1>
          </div>
        </div>
        <div class="top-actions">
          <span class="status-chip" id="generationStatus">Local mode</span>
          <button class="generate-button blocked" id="generateButton" type="button" disabled>Generate</button>
          <div class="device-switch" aria-label="Device Switch">
            <button type="button" data-device="pico">Pico</button>
            <button type="button" data-device="picofx">PicoFX</button>
          </div>
        </div>
      </header>

      <section class="slot-bar" aria-label="Bootloader app slots">
        <h2>Slots</h2>
        <div class="slots" id="slots"></div>
        <div class="slot-usage" aria-label="Firmware capacity usage">
          <div class="usage-track" aria-hidden="true">
            <div class="usage-fill" id="usageFill"></div>
          </div>
          <span class="usage-label" id="usageLabel">0KB / 3.5MB</span>
        </div>
        <div class="slot-actions" aria-label="Slot actions">

            <span class="slot-trash-label">Delete</span>
          </div>
          <div class="slot-clear">
            <button class="slot-clear-all" id="clearAllSlots" type="button">Clear all</button>
          </div>
        </div>
      </section>

      <main class="main">
        <aside class="panel">
          <div class="panel-head">
            <h2>App Catalog</h2>
            <span class="chip" id="catalogCount"></span>
          </div>
          <div class="panel-body">
            <input class="catalog-search" id="search" type="search" placeholder="Search App">
            <div class="app-list" id="appList"></div>
          </div>
        </aside>

        <section class="preview">
          <div class="module">
            <img id="panelImage" src="../images/Pico_2D.png" alt="Pico panel preview">
          </div>
        </section>

        <aside class="panel details">
          <div class="panel-body">
            <div class="selected-title">
              <h2 id="selectedName">TripleOSC</h2>
              <p id="selectedDescription"></p>
            </div>
            <div class="page-tabs" id="pageTabs"></div>
            <div class="function-list" id="functionList"></div>
          </div>
        </aside>
      </main>
    </section>
    <div class="footer-reveal-space" id="footerRevealSpace" aria-hidden="true"></div>
    <footer class="site-footer">
      <span>This client is built upon https://github.com/rheslip/2HPico-Eurorack-Module-Hardware.</span>
      <span>Original author: Rich Heslip</span>
      <img src="../images/fm.synth.jpg" alt="by fm.synth">
    </footer>
    <div class="build-overlay" id="buildOverlay" aria-live="polite" aria-label="Build progress">
      <div class="build-progress">
        <div class="build-progress-head">
          <strong id="buildProgressMessage">Building</strong>
          <span id="buildProgressPercent">0%</span>
        </div>
        <div class="build-progress-row">
          <div class="build-progress-track" aria-hidden="true">
            <div class="build-progress-fill" id="buildProgressFill"></div>
          </div>
          <button class="build-cancel" id="buildCancel" type="button" aria-label="Cancel build">&times;</button>
        </div>
      </div>
    </div>
    <div class="sample-modal" id="sampleModal" aria-hidden="true">
      <div class="sample-dialog" role="dialog" aria-modal="true" aria-labelledby="sampleTitle">
        <div class="sample-dialog-head">
          <div>
            <h2 id="sampleTitle">Samples</h2>
            <p id="sampleSubtitle"></p>
          </div>
          <button class="sample-close" id="sampleClose" type="button" aria-label="Close samples">&times;</button>
        </div>
        <div class="sample-content">
          <div class="sample-status" id="sampleStatus"></div>
          <div class="sample-bank-list" id="sampleBankList"></div>
        </div>
        <form class="sample-uploader" id="sampleUploadForm">
          <input id="sampleBankName" type="text" placeholder="New Bank" aria-label="New Bank">
          <input id="sampleFiles" type="file" accept=".wav,audio/wav,audio/x-wav" multiple aria-label="WAV files">
          <button class="sample-upload-button" id="sampleUploadButton" type="submit">Upload</button>
        </form>
      </div>
    </div>
  </div>

            page("SPACE", ["Size", "Tone", "Modulation", "Wet / dry mix"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Single page")),
          app("SpectralSmash", "Freeze / tear spectral processor", [
            page("SPECTRAL", ["Warp / tear", "Blur", "Time smear", "Wet / dry mix"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Short press freeze, hold recaptures"))
        ]
      }
    };

    function app(name, description, pages, hardware) {
      return { name, description, pages, hardware };
    }

    function page(name, params) {
      return { name, params };
    }

    function io(cv, input, aux, out, button) {
      return { cv, input, aux, out, button };
    }

    const buildCancel = document.getElementById("buildCancel");

    const sampleTitle = document.getElementById("sampleTitle");
    const sampleSubtitle = document.getElementById("sampleSubtitle");
    const sampleClose = document.getElementById("sampleClose");
    const sampleUploadForm = document.getElementById("sampleUploadForm");
    const sampleBankName = document.getElementById("sampleBankName");

      app: "application/x-app-index",

    const DEFAULT_STORAGE_BYTES = 3584 * 1024;
    const apiState = {

      storageBytes: DEFAULT_STORAGE_BYTES,
      slotAlignBytes: 4096,
      maxSlots: 6,
      appsByName: new Map(),
      baseUrl: null
    };

      app: "",

    };
    const PANEL_FOCUS = {

      });

    window.addEventListener("resize", updateFooterReveal);

    function resetDeviceDefaults() {
      state.selectedSlot = 0;
      state.slots = Array.from({ length: apiState.maxSlots }, () => "");
    }

    function currentDevice() {
      return DATA[state.device];
    }

    function currentApp() {
      return currentDevice().apps[state.selectedApp];
    }

    function currentPage() {
      const appData = currentApp();
      return appData.pages[Math.min(state.selectedPage, appData.pages.length - 1)];
    }

    function updateFooterReveal() {
      if (!footerRevealSpace) return;
      const revealRect = footerRevealSpace.getBoundingClientRect();
      const revealDistance = Math.max(1, footerRevealSpace.offsetHeight);
      const progress = Math.min(1, Math.max(0, (window.innerHeight - revealRect.top) / revealDistance));
      document.documentElement.style.setProperty("--footer-progress", progress.toFixed(3));
    }

    function apiCandidates() {
      const sameOrigin = window.location.protocol === "http:" || window.location.protocol === "https:";
      const bases = sameOrigin ? [""] : [];
      for (let port = 8765; port < 8785; port += 1) {
        bases.push(`http://127.0.0.1:${port}`);
      }
      return bases;
    }

    async function apiFetch(path, options = {}) {
      const hasPinnedBase = apiState.baseUrl !== null;
      const bases = hasPinnedBase ? [apiState.baseUrl] : apiCandidates();
      let lastError = null;
      for (const base of bases) {
        try {
          const response = await fetch(`${base}${path}`, options);
          if (response.ok || hasPinnedBase) {
            apiState.baseUrl = base;
            return response;
          }
          lastError = new Error(`HTTP ${response.status}`);
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("API unavailable");
    }

    async function loadManifest(showProgress = false) {
      if (showProgress) {
        buildCancel.disabled = true;
        beginBuildUi();
        startProgressTicker("Loading...", 8, 88);
      }
      try {
        const response = await apiFetch("/api/manifest", { cache: "no-store" });
        if (!response.ok) throw new Error(`Manifest HTTP ${response.status}`);
        const manifest = await response.json();
        apiState.available = true;
        apiState.storageBytes = manifest.storageBytes || DEFAULT_STORAGE_BYTES;
        apiState.slotAlignBytes = manifest.slotAlignBytes || 4096;
        apiState.maxSlots = manifest.maxSlots || 6;
        apiState.appsByName = new Map(manifest.apps.map((item) => [item.name, item]));
        hydrateAppMetadata();
        setStatus("Ready");
      } catch (_error) {
        apiState.available = false;
        hydrateAppMetadata();
        setStatus("API offline", true);
      }
      render();
      if (showProgress) {
        try {
          setBuildProgress(100, apiState.available ? "Catalog ready" : "API offline");
          await delay(220);
        } finally {
          endBuildUi(false);
          buildCancel.disabled = false;
        }
      }
    }

    function hydrateAppMetadata() {
      Object.values(DATA).forEach((device) => {
        device.apps.forEach((item) => {
          applyAppMetadata(item, apiState.appsByName.get(item.name));
        });
      });
    }

    function applyAppMetadata(item, meta) {
      item.id = meta?.id || item.name;
      item.sizeBytes = Number.isFinite(meta?.sizeBytes) ? meta.sizeBytes : null;
      item.allocatedBytes = Number.isFinite(meta?.allocatedBytes) ? meta.allocatedBytes : item.sizeBytes;
      item.fitsRegion = meta?.fitsRegion;
    }

    function updateCatalogAppMetadata(meta) {
      if (!meta?.name) return;
      apiState.appsByName.set(meta.name, meta);
      Object.values(DATA).forEach((device) => {
        const item = device.apps.find((appData) => appData.name === meta.name);
        if (item) applyAppMetadata(item, meta);
      });
      renderAppList();
      renderSlots();
      renderDetails();
      updateGenerateAvailability();
    }

    function setStatus(message, isError = false) {
      generationStatus.textContent = message;
      generationStatus.classList.toggle("error", isError);
    }

    function render() {
      const device = currentDevice();
      document.getElementById("panelImage").src = device.image;
      document.getElementById("panelImage").alt = `${device.label} panel preview`;
      document.querySelectorAll("[data-device]").forEach((button) => {
        button.classList.toggle("active", button.dataset.device === state.device);
      });
      renderAppList();
      renderSlots();
      renderDetails();
      updateSegmentSliders();
    }

    function renderAppList() {
      const needle = search.value.trim().toLowerCase();
      const apps = currentDevice().apps;
      document.getElementById("catalogCount").textContent = `${apps.length} apps`;
      appList.innerHTML = "";
      let visibleCount = 0;
      apps.forEach((item, index) => {
        const haystack = `${item.name} ${item.description} ${item.pages.map((p) => p.params.join(" ")).join(" ")}`.toLowerCase();
        if (needle && !haystack.includes(needle)) return;
        visibleCount += 1;
        const isInSlot = isAppInSlot(item.name);
        const hasSampleClient = Boolean(SAMPLE_CLIENTS[item.name]);
        const wrap = document.createElement("div");
        wrap.className = `app-card-wrap${hasSampleClient ? " has-sample-settings" : ""}`;
        const button = document.createElement("button");
        button.type = "button";
        button.className = `app-card${index === state.selectedApp ? " active" : ""}${isInSlot ? " in-slot" : ""}`;
        button.draggable = !isInSlot;
        button.innerHTML = `<strong>${item.name}</strong><span>${item.description} · ${appSizeLabel(item)}</span>`;
        button.addEventListener("dragstart", (event) => {
          if (isAppInSlot(item.name)) {
            event.preventDefault();
            return;
          }
          event.dataTransfer.setData(DRAG_TYPE.app, String(index));
          event.dataTransfer.effectAllowed = "copy";
          beginDrag("app", button);
        });
        button.addEventListener("dragend", () => {
          clearDragState();
        });
        button.addEventListener("click", () => {
          state.selectedApp = index;
          state.selectedPage = 0;
          renderAppList();
          renderDetails();
        });
        wrap.appendChild(button);
        if (hasSampleClient) {
          const settings = document.createElement("button");
          settings.type = "button";
          settings.className = "sample-settings";
          settings.textContent = "Edit";
          settings.addEventListener("click", (event) => {
            event.stopPropagation();
            openSampleClient(item.name);
          });
          wrap.appendChild(settings);
        }
        appList.appendChild(wrap);
      });
      if (!visibleCount) {
        appList.innerHTML = `<div class="empty-state">No apps match this search.</div>`;
      }
    }

    async function openSampleClient(appName) {
      sampleState.app = appName;
      sampleState.payload = null;
      sampleTitle.textContent = `${appName} Samples`;
      sampleSubtitle.textContent = SAMPLE_CLIENTS[appName]?.subtitle || "";
      sampleStatus.textContent = "Loading samples...";
      sampleStatus.classList.remove("error");
      sampleBankList.innerHTML = "";
      sampleFiles.value = "";
      sampleBankName.value = "";
      sampleModal.classList.add("open");
      sampleModal.setAttribute("aria-hidden", "false");
      await refreshSampleClient();
    }

    function closeSampleClient() {
      sampleModal.classList.remove("open");
      sampleModal.setAttribute("aria-hidden", "true");
      sampleState.app = "";
      sampleState.payload = null;
    }

    async function refreshSampleClient() {
      if (!sampleState.app) return;
      try {
        const response = await apiFetch(`/api/samples?app=${encodeURIComponent(sampleState.app)}`, { cache: "no-store" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || `Samples HTTP ${response.status}`);
        sampleState.payload = payload;
        renderSampleClient();
        sampleStatus.textContent = "Ready";
        sampleStatus.classList.remove("error");
      } catch (error) {
        sampleStatus.textContent = error.message || "Failed to load samples";
        sampleStatus.classList.add("error");
      }
    }

    function renderSampleClient() {
      const payload = sampleState.payload;
      if (!payload) return;
      if (payload.bankless) {
        sampleBankName.hidden = true;
        sampleBankName.disabled = true;
        const libraryFiles = payload.libraryFiles || [];
        const wavs = payload.wavs || [];
        const files = libraryFiles.slice(0, 72).map((item) => {
          const size = Number.isFinite(item.bytes) ? ` · ${formatCapacityBytes(item.bytes)}` : "";
          return `<span class="sample-file-pill">${escapeHtml(item.name)}${size}</span>`;
        }).join("");
        const hiddenCount = Math.max(0, libraryFiles.length - 72);
        sampleBankList.innerHTML = `
          <section class="sample-bank">
            <div class="sample-bank-head">
              <strong>Sample library</strong>
              <span>${libraryFiles.length} headers · ${wavs.length} WAV files</span>
            </div>
            <div class="sample-file-list">
              ${files || "<span>No library headers found in Samples.h / samples.h.</span>"}
              ${hiddenCount ? `<span class="sample-file-pill">+${hiddenCount} more</span>` : ""}
            </div>
          </section>
        `;
        return;
      }

      sampleBankName.hidden = false;
      const banks = payload.banks || [];
      sampleBankName.disabled = false;
      sampleBankName.placeholder = "New Bank";

      sampleBankList.innerHTML = banks.map((bank) => {
        const files = (bank.samples || []).slice(0, 36).map((item) => {
          return `<span class="sample-file-pill">${escapeHtml(item.name)} · ${formatCapacityBytes(item.bytes)}</span>`;
        }).join("");
        const hiddenCount = Math.max(0, (bank.samples || []).length - 36);
        return `
          <section class="sample-bank">
            <div class="sample-bank-head">
              <div class="sample-bank-title">
                <strong>${escapeHtml(bank.name)}</strong>
                <button class="sample-delete-bank" type="button" data-bank="${escapeHtml(bank.name)}">Delete</button>
              </div>
              <span>${bank.count} samples · ${formatCapacityBytes(bank.bytes)}</span>
            </div>
            <div class="sample-file-list">
              ${files || "<span>No WAV files yet.</span>"}
              ${hiddenCount ? `<span class="sample-file-pill">+${hiddenCount} more</span>` : ""}
            </div>
          </section>
        `;
      }).join("") || `<div class="empty-state">No sample banks found.</div>`;
      sampleBankList.querySelectorAll(".sample-delete-bank").forEach((button) => {
        button.addEventListener("click", () => deleteSampleBank(button.dataset.bank || ""));
      });
    }

    async function uploadSampleFiles(event) {
      event.preventDefault();
      if (!sampleState.app) {
        sampleStatus.textContent = "Open a sampler first.";
        sampleStatus.classList.add("error");
        return;
      }
      const payload = sampleState.payload;
      const bankless = Boolean(payload?.bankless);
      const bankName = bankless ? "" : (sampleBankName.value.trim() || "Custom");
      const form = new FormData();
      form.append("app", sampleState.app);
      form.append("bank", bankName);
      Array.from(sampleFiles.files).forEach((file) => form.append("files", file));
      const hasFiles = sampleFiles.files.length > 0;

      sampleUploadButton.disabled = true;
      buildCancel.disabled = true;
      beginBuildUi();
      setBuildProgress(5, hasFiles ? "Uploading samples" : "Compiling capacity estimate");
      if (hasFiles) {
        startProgressTicker("Refreshing sample headers", 8, 48);
      } else {
        startProgressTicker("Compiling capacity estimate", 12, 92);
      }
      sampleStatus.textContent = hasFiles ? "Uploading and refreshing headers..." : "Compiling capacity estimate...";
      sampleStatus.classList.remove("error");
      try {
        let result = null;
        if (hasFiles) {
          const response = await apiFetch("/api/samples/upload", {
            method: "POST",
            body: form
          });
          result = await response.json();
          if (!response.ok) throw new Error(result.error || `Upload HTTP ${response.status}`);
          sampleState.payload = result;
          sampleFiles.value = "";
          sampleBankName.value = "";
          renderSampleClient();
          startProgressTicker("Compiling capacity estimate", 55, 92);
        }
        await refreshAppCapacity(sampleState.app);
        setBuildProgress(100, "Capacity updated");
        await delay(240);
        endBuildUi(false);
        sampleModal.classList.add("open");
        sampleModal.setAttribute("aria-hidden", "false");
        if (hasFiles) {
          const destination = result.bank ? ` to ${result.bank}` : "";
          sampleStatus.textContent = `Uploaded ${result.saved.length} file${result.saved.length === 1 ? "" : "s"}${destination}. Capacity updated.`;
        } else {
          sampleStatus.textContent = "Capacity updated.";
        }
      } catch (error) {
        endBuildUi(false);
        sampleStatus.textContent = error.message || (hasFiles ? "Upload failed" : "Capacity update failed");
        sampleStatus.classList.add("error");
      } finally {
        if (state.progressTimer) {
          clearTimeout(state.progressTimer);
          state.progressTimer = 0;
        }
        if (state.generating) endBuildUi(false);
        buildCancel.disabled = false;
        sampleUploadButton.disabled = false;
      }
    }

    async function deleteSampleBank(bankName) {
      if (!sampleState.app || !bankName) return;
      if (!window.confirm(`Delete bank "${bankName}" and all WAV/header files inside it?`)) return;

      sampleStatus.textContent = `Deleting ${bankName}...`;
      sampleStatus.classList.remove("error");
      try {
        const response = await apiFetch("/api/samples/delete-bank", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            app: sampleState.app,
            bank: bankName
          })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `Delete HTTP ${response.status}`);
        sampleState.payload = result;
        renderSampleClient();
        sampleStatus.textContent = `Deleted ${result.deleted || bankName}. Click Upload to compile capacity and update Catalog.`;
      } catch (error) {
        sampleStatus.textContent = error.message || "Delete failed";
        sampleStatus.classList.add("error");
      }
    }

    async function refreshAppCapacity(appName) {
      const response = await apiFetch(`/api/app-size?app=${encodeURIComponent(appName)}`, { cache: "no-store" });
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || `Capacity HTTP ${response.status}`);
      updateCatalogAppMetadata(payload);
      return payload;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function renderSlots() {
      slots.innerHTML = "";
      state.slots.forEach((name, index) => {
        const appData = appByName(name);
        const row = document.createElement("div");
        row.className = `slot-row${index === state.selectedSlot ? " active" : ""}`;
        row.draggable = Boolean(name);
        const slotIndexClass = name ? SLOT_COLOR_CLASSES[index] : "empty";
        row.innerHTML = `
          <div class="slot-index ${slotIndexClass}">${index + 1}</div>
          <strong class="${name ? "" : "slot-empty"}">${name || "Empty"}</strong>
          <span class="slot-size">${appData ? appSizeLabel(appData) : "0KB"}</span>
          <span class="drag-handle" aria-hidden="true"></span>
        `;
        row.addEventListener("dragstart", (event) => {
          if (!name) {
            event.preventDefault();
            return;
          }
          event.dataTransfer.setData(DRAG_TYPE.slot, String(index));
          event.dataTransfer.effectAllowed = "move";
          beginDrag("slot", row);
        });
        row.addEventListener("dragend", () => {
          clearDragState();
        });
        row.addEventListener("dragover", (event) => {
          const dragKind = getDragKind(event);
          if (!dragKind) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = dragKind === "slot" ? "move" : "copy";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", () => {
          row.classList.remove("drag-over");
        });
        row.addEventListener("drop", (event) => {
          const dragKind = getDragKind(event);
          if (!dragKind) return;
          event.preventDefault();
          row.classList.remove("drag-over");
          dragKind === "slot" ? swapSlotFromDrag(event, index) : assignAppFromDrag(event, index);
        });
        row.addEventListener("click", () => {
          state.selectedSlot = index;
          selectAppByName(name);
          renderAllSlotsAndDetails();
        });
        slots.appendChild(row);
      });
      renderCapacityUsage();
    }

    function assignAppFromDrag(event, slotIndex) {
      const appIndex = Number(event.dataTransfer.getData(DRAG_TYPE.app));
      const appData = currentDevice().apps[appIndex];
      if (!appData || isAppInSlot(appData.name)) {
        clearDragState();
        return;
      }
      state.selectedSlot = slotIndex;
      state.selectedApp = appIndex;
      state.selectedPage = 0;
      state.slots[slotIndex] = appData.name;
      clearDragState();
      renderAllSlotsAndDetails();
    }

    function swapSlotFromDrag(event, targetIndex) {
      const sourceIndex = Number(event.dataTransfer.getData(DRAG_TYPE.slot));
      if (!Number.isInteger(sourceIndex) || sourceIndex === targetIndex) {
        clearDragState();
        return;
      }
      [state.slots[sourceIndex], state.slots[targetIndex]] = [state.slots[targetIndex], state.slots[sourceIndex]];
      state.selectedSlot = targetIndex;
      selectAppByName(state.slots[targetIndex]);
      clearDragState();
      renderAllSlotsAndDetails();
    }

    function renderAllSlotsAndDetails() {
      renderSlots();
      renderAppList();
      renderDetails();
    }

    function selectAppByName(name) {
      const appIndex = currentDevice().apps.findIndex((item) => item.name === name);
      if (appIndex < 0) return;
      state.selectedApp = appIndex;
      state.selectedPage = 0;
    }

    function isAppInSlot(name) {
      return Boolean(name) && state.slots.includes(name);
    }

    function appByName(name) {
      return currentDevice().apps.find((item) => item.name === name);
    }

    function appSizeLabel(appData) {
      if (!appData || !Number.isFinite(appData.sizeBytes)) return "Build";
      const suffix = appData.fitsRegion === false ? " > storage" : "";
      return `${formatCapacityBytes(appData.sizeBytes)}${suffix}`;
    }

    function beginDrag(kind, element) {
      clearDragState();
      element.classList.add("dragging");
      document.body.classList.add(`${kind}-dragging`);
    }

    function getDragKind(event) {
      if (hasDragType(event, DRAG_TYPE.slot)) return "slot";
      if (hasDragType(event, DRAG_TYPE.app)) return "app";
      return "";
    }

    function hasDragType(event, type) {
      return Array.from(event.dataTransfer.types).includes(type);
    }

    function clearDragState() {
      document.body.classList.remove("app-dragging");
      document.body.classList.remove("slot-dragging");
      document.querySelectorAll(".app-card.dragging").forEach((card) => {
        card.classList.remove("dragging");
      });
      document.querySelectorAll(".slot-row.dragging").forEach((row) => {
        row.classList.remove("dragging");
      });
      document.querySelectorAll(".slot-row.drag-over").forEach((row) => {
        row.classList.remove("drag-over");
      });
      slotTrash.classList.remove("drag-over");
    }

    slotTrash.addEventListener("dragover", (event) => {
      if (!hasDragType(event, DRAG_TYPE.slot)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      slotTrash.classList.add("drag-over");
    });

    slotTrash.addEventListener("dragleave", () => {
      slotTrash.classList.remove("drag-over");
    });

    slotTrash.addEventListener("drop", (event) => {
      event.preventDefault();
      slotTrash.classList.remove("drag-over");
      const slotIndex = Number(event.dataTransfer.getData(DRAG_TYPE.slot));
      if (!Number.isInteger(slotIndex) || !state.slots[slotIndex]) {
        clearDragState();
        return;
      }
      state.slots[slotIndex] = "";
      state.selectedSlot = slotIndex;
      clearDragState();
      renderAllSlotsAndDetails();
    });

    clearAllSlots.addEventListener("click", () => {
      state.slots = state.slots.map(() => "");
      state.selectedSlot = 0;
      state.selectedApp = 0;
      state.selectedPage = 0;
      renderAllSlotsAndDetails();
    });

    function renderCapacityUsage() {
      const selectedApps = state.slots.map(appByName).filter(Boolean);
      const knownBytes = selectedApps.reduce((total, item) => {
        return total + (Number.isFinite(item.sizeBytes) ? item.sizeBytes : 0);
      }, 0);
      const allocatedBytes = selectedApps.reduce((total, item) => {
        return total + (Number.isFinite(item.allocatedBytes) ? item.allocatedBytes : 0);
      }, 0);
      const unknownCount = selectedApps.filter((item) => !Number.isFinite(item.sizeBytes)).length;
      const totalBytes = apiState.storageBytes;
      const percent = totalBytes ? Math.min(100, Math.round((allocatedBytes / totalBytes) * 100)) : 0;
      usageFill.style.width = `${percent}%`;
      usageLabel.textContent = `${formatCapacityBytes(knownBytes)} / ${formatCapacityBytes(totalBytes)}${unknownCount ? ` · ${unknownCount} build` : ""}`;
      updateGenerateAvailability(allocatedBytes, selectedApps.length);
    }

    function updateGenerateAvailability(allocatedBytes = null, selectedCount = null, updateStatus = true) {
      const selectedApps = selectedCount === null ? state.slots.map(appByName).filter(Boolean) : null;
      const count = selectedCount === null ? selectedApps.length : selectedCount;
      const usedBytes = allocatedBytes === null
        ? selectedApps.reduce((total, item) => total + (Number.isFinite(item.allocatedBytes) ? item.allocatedBytes : 0), 0)
        : allocatedBytes;
      const withinStorage = usedBytes <= apiState.storageBytes;
      const canGenerate = apiState.available && count > 0 && withinStorage && !state.generating;

      generateButton.disabled = !canGenerate;
      generateButton.classList.toggle("ready", canGenerate);
      generateButton.classList.toggle("blocked", !canGenerate);

      if (updateStatus && !state.generating) {
        if (!apiState.available) setStatus("API offline", true);
        else if (!count) setStatus("Select app");
        else if (!withinStorage) setStatus("Storage full", true);
        else setStatus("Ready");
      }
    }

    function setBuildProgress(progress, message = "Building") {
      const value = Math.max(0, Math.min(100, Number(progress) || 0));
      buildProgressFill.style.width = `${value}%`;
      buildProgressPercent.textContent = `${Math.round(value)}%`;
      buildProgressMessage.textContent = message;
    }

    function startProgressTicker(message, start, limit) {
      if (state.progressTimer) {
        clearTimeout(state.progressTimer);
        state.progressTimer = 0;
      }
      let value = Math.max(0, Math.min(100, Number(start) || 0));
      const max = Math.max(value, Math.min(99, Number(limit) || 90));
      setBuildProgress(value, message);
      const tick = () => {
        if (!state.generating) return;
        value = Math.min(max, value + Math.max(1, Math.ceil((max - value) * 0.16)));
        setBuildProgress(value, message);
        if (value < max) {
          state.progressTimer = window.setTimeout(tick, 420);
        }
      };
      state.progressTimer = window.setTimeout(tick, 420);
    }

    function delay(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function beginBuildUi() {
      state.generating = true;
      document.querySelector(".app").classList.add("generating");
      setBuildProgress(0, "Queued");
      updateGenerateAvailability();
    }

    function endBuildUi(updateStatus = true) {
      state.generating = false;
      state.buildJobId = "";
      if (state.progressTimer) {
        clearTimeout(state.progressTimer);
        state.progressTimer = 0;
      }
      document.querySelector(".app").classList.remove("generating");
      updateGenerateAvailability(null, null, updateStatus);
    }

    function formatCapacityBytes(bytes) {
      if (!Number.isFinite(bytes)) return "Build";
      const kb = Math.ceil(bytes / 1024);
      return kb >= 1024 ? `${Number((kb / 1024).toFixed(1))}MB` : `${kb}KB`;
    }

    function renderDetails() {
      const appData = currentApp();
      const pageData = currentPage();
      document.getElementById("selectedName").textContent = appData.name;
      document.getElementById("selectedDescription").textContent = `${appData.description} · ${appSizeLabel(appData)} slot use`;
      pageTabs.innerHTML = "";
      appData.pages.forEach((pageItem, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = pageItem.name;
        button.classList.toggle("active", index === state.selectedPage);
        button.addEventListener("click", () => {
          state.selectedPage = index;
          renderDetails();
          slideSegmentToActive(pageTabs);
        });
        pageTabs.appendChild(button);
      });

      const rows = [
        ["IN", appData.hardware.input],
        ["PAGE", appData.hardware.button],
        ["PARAM 1", pageData.params[0]],
        ["PARAM 2", pageData.params[1]],
        ["PARAM 3", pageData.params[2]],
        ["PARAM 4", pageData.params[3]],
        ["AUX", appData.hardware.cv],
        ["OUT", appData.hardware.out]
      ];
      functionList.innerHTML = rows.map(([label, value]) => `
        <div class="function-row" data-focus="${label}"><b>${label}</b><span>${value || "Not used / TBD"}</span></div>
      `).join("");
      bindFunctionFocus();
      updateSegmentSliders();
    }

    function updateSegmentSliders() {
      requestAnimationFrame(() => {
        document.querySelectorAll(".device-switch, .page-tabs").forEach((segment) => {
          slideSegmentToActive(segment);
        });
      });
    }

    function slideSegmentToActive(segment) {
      if (!segment) return;
      const activeButton = segment.querySelector("button.active");
      if (!activeButton) return;
      segment.style.setProperty("--slider-x", `${activeButton.offsetLeft}px`);
      segment.style.setProperty("--slider-width", `${activeButton.offsetWidth}px`);
      if (segment.classList.contains("page-tabs")) {
        activeButton.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
    }

    function bindFunctionFocus() {
      functionList.querySelectorAll(".function-row").forEach((row) => {
        row.addEventListener("mouseenter", () => focusPanelControl(row.dataset.focus));
        row.addEventListener("mouseleave", clearPanelFocus);
      });
    }

    function focusPanelControl(label) {
      const target = PANEL_FOCUS[label];
      if (!target) return;
      modulePreview.classList.add("focusing");
      modulePreview.style.setProperty("--focus-x", target.x);
      modulePreview.style.setProperty("--focus-y", target.y);
      modulePreview.style.setProperty("--focus-scale", target.scale);
    }

    function clearPanelFocus() {
      modulePreview.classList.remove("focusing");
      modulePreview.style.setProperty("--focus-scale", 1);
    }

    async function generateFirmware() {
      if (!apiState.available) {
        setStatus("Start server.py", true);
        return;
      }

      const slotIds = state.slots.map((name) => {
        const appData = appByName(name);
        return appData ? appData.id : "";
      });
      if (!slotIds.some(Boolean)) {
        setStatus("No slots", true);
        return;
      }
      const selectedApps = state.slots.map(appByName).filter(Boolean);
      const allocatedBytes = selectedApps.reduce((total, item) => {
        return total + (Number.isFinite(item.allocatedBytes) ? item.allocatedBytes : 0);
      }, 0);
      if (allocatedBytes > apiState.storageBytes) {
        setStatus("Storage full", true);
        return;
      }

      beginBuildUi();
      setStatus("Building...");
      try {
        const response = await apiFetch("/api/generate/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            device: state.device,
            slots: slotIds,
            active: state.selectedSlot
          })
        });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `Generate HTTP ${response.status}`);
        }
        const job = await response.json();
        state.buildJobId = job.id;
        setBuildProgress(job.progress || 0, job.message || "Queued");
        pollBuildStatus();
      } catch (error) {
        setStatus(error.message || "Generate failed", true);
        endBuildUi(false);
      }
    }

    async function pollBuildStatus() {
      if (!state.buildJobId) return;
      try {
        const response = await apiFetch(`/api/generate/status?id=${encodeURIComponent(state.buildJobId)}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Status HTTP ${response.status}`);
        const job = await response.json();
        setBuildProgress(job.progress || 0, job.message || "Building");

        if (job.status === "done") {
          await downloadBuildOutput(job.id);
          setStatus("Generated");
          endBuildUi(false);
          return;
        }
        if (job.status === "cancelled") {
          setStatus("Cancelled", true);
          endBuildUi(false);
          return;
        }
        if (job.status === "error") {
          throw new Error(job.error || "Generate failed");
        }

        state.progressTimer = window.setTimeout(pollBuildStatus, 500);
      } catch (error) {
        setStatus(error.message || "Generate failed", true);
        endBuildUi(false);
      }
    }

    async function downloadBuildOutput(jobId) {
      const response = await apiFetch(`/api/generate/download?id=${encodeURIComponent(jobId)}`);
      if (!response.ok) throw new Error(`Download HTTP ${response.status}`);
      const blob = await response.blob();
      const filename = filenameFromDisposition(response.headers.get("Content-Disposition"))
        || `Pico-Eurorack-${state.device}.uf2`;
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function cancelBuild() {
      if (!state.buildJobId) return;
      buildCancel.disabled = true;
      setBuildProgress(Number.parseInt(buildProgressPercent.textContent, 10) || 0, "Cancelling");
      try {
        await apiFetch("/api/generate/cancel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: state.buildJobId })
        });
      } finally {
        buildCancel.disabled = false;
      }
    }

    function filenameFromDisposition(header) {
      if (!header) return "";
      const match = header.match(/filename="([^"]+)"/);
      return match ? match[1] : "";
    }

    loadManifest(true);
    updateFooterReveal();
  </script>
</body>
