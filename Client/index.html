<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico-Eurorack Client</title>
  <style>
    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-400-Book.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-500-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Jost";
      src: url("./fonts/Jost-700-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #eef1f3;
      --surface: #ffffff;
      --surface-soft: #f8fafb;
      --ink: #15181c;
      --muted: #68707b;
      --line: #dbe1e8;
      --line-strong: #b7c0cb;
      --accent: #3f464e;
      --accent-soft: rgba(63, 70, 78, 0.1);
      --danger: #b53243;
      --shadow: 0 20px 52px rgba(20, 24, 28, 0.1);
      --radius: 8px;
      --column-height: clamp(520px, calc(100vh - 196px), 650px);
      font-family: "Jost", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(21, 24, 28, 0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(21, 24, 28, 0.03) 1px, transparent 1px),
        linear-gradient(180deg, #fbfcfd 0%, #eef1f3 48%, #e8ecef 100%),
        var(--bg);
      background-size: 24px 24px, 24px 24px, auto;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      color: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .workspace {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 72px auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      object-fit: cover;
      background: #fff;
      border: 1px solid var(--line);
      padding: 4px;
      flex: none;
      box-shadow: 0 10px 28px rgba(20, 24, 28, 0.09);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      white-space: nowrap;
      font-weight: 700;
      line-height: 1.12;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
      display: block;
      margin-top: 3px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slot-bar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      gap: 14px;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 250, 251, 0.9);
      backdrop-filter: blur(16px);
    }

    .slot-bar h2 {
      grid-column: 1;
      grid-row: 1;
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .device-switch,
    .page-tabs {
      display: flex;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
    }

    .device-switch button,
    .page-tabs button {
      border: 0;
      background: transparent;
      min-height: 36px;
      padding: 0 14px;
      color: var(--muted);
      font-weight: 500;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .device-switch button.active,
    .page-tabs button.active {
      background: var(--ink);
      color: #fff;
    }

    .page-tabs {
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(320px, 0.92fr) minmax(112px, 160px) minmax(380px, 1.08fr);
      gap: 18px;
      padding: 18px 24px 24px;
      align-items: stretch;
    }

    .panel {
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      height: var(--column-height);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .details {
      overflow: visible;
    }

    .panel-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfc 100%);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .panel-body {
      padding: 16px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .details .panel-body {
      overflow-x: visible;
    }

    .catalog-search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 42px;
      padding: 0 12px;
      margin-bottom: 14px;
      background: var(--surface-soft);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .catalog-search:focus {
      border-color: rgba(63, 70, 78, 0.58);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(63, 70, 78, 0.12);
    }

    .app-list {
      display: grid;
      gap: 8px;
      padding-right: 4px;
    }

    .app-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 11px 12px;
      text-align: left;
      user-select: none;
      will-change: transform;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .app-card:hover {
      border-color: var(--line-strong);
      box-shadow: 0 10px 24px rgba(20, 24, 28, 0.08);
      transform: translateY(-1px);
    }

    .app-card.active {
      border-color: rgba(63, 70, 78, 0.62);
      background: linear-gradient(180deg, #ffffff 0%, rgba(63, 70, 78, 0.07) 100%);
      box-shadow: inset 3px 0 0 var(--accent), 0 10px 24px rgba(63, 70, 78, 0.12);
    }

    .app-card[draggable="true"] {
      cursor: grab;
    }

    .app-card[draggable="true"]:active {
      cursor: grabbing;
    }

    .app-card.dragging {
      opacity: 0.56;
      transform: scale(0.99);
    }

    .app-card strong {
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .app-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      grid-column: 1 / -1;
    }

    .app-card::after {
      content: "";
      justify-self: end;
      align-self: start;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background:
        radial-gradient(circle, var(--line-strong) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }

    .app-card.active::after {
      background:
        radial-gradient(circle, var(--accent) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }

    .empty-state {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 18px 14px;
      color: var(--muted);
      background: var(--surface-soft);
      text-align: center;
      font-size: 13px;
    }

    .slots {
      display: grid;
      grid-column: 2;
      grid-row: 1;
      grid-template-columns: repeat(6, minmax(126px, 1fr));
      gap: 10px;
      min-width: 0;
    }

    .slot-usage {
      grid-column: 2;
      grid-row: 2;
      display: grid;
      grid-template-columns: minmax(180px, 420px) auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .usage-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8ebef;
      border: 1px solid #d7dce3;
    }

    .usage-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #15181c);
      transition: width 0.18s ease;
    }

    .usage-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .slot-trash {
      grid-column: 3;
      grid-row: 1 / span 2;
      align-self: stretch;
      min-width: 96px;
      border: 1px solid #efb6bd;
      border-radius: var(--radius);
      background: #fff1f3;
      color: var(--danger);
      display: grid;
      place-items: center;
      gap: 2px;
      padding: 8px 10px;
      text-align: center;
      user-select: none;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .slot-trash span {
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .slot-trash.drag-over {
      border-color: #dc5364;
      background: #ffe2e6;
      box-shadow: 0 16px 36px rgba(220, 83, 100, 0.28), 0 0 0 3px rgba(220, 83, 100, 0.14);
      transform: translateY(-1px);
    }

    .slot-empty {
      color: #98a2ad;
    }

    .slot-index.empty {
      background: #a8b1bb;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 18px;
      gap: 7px;
      align-items: center;
      min-height: 42px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      user-select: none;
      will-change: transform;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
    }

    .slot-row strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-row.drag-over {
      border-color: var(--line-strong);
      background: #f1f3f6;
      box-shadow: 0 16px 36px rgba(20, 24, 28, 0.18), 0 0 0 3px rgba(20, 24, 28, 0.08);
    }

    .app-dragging .slot-row,
    .slot-dragging .slot-row {
      border-color: #c4cad2;
      background: #f5f7f9;
    }

    .slot-row.active {
      border-color: rgba(63, 70, 78, 0.7);
      background: #fff;
      box-shadow: inset 3px 0 0 var(--accent), 0 8px 22px rgba(63, 70, 78, 0.12);
    }

    .app-dragging .slot-row.drag-over,
    .slot-dragging .slot-row.drag-over,
    .slot-row.active.drag-over {
      border-color: #aeb4bc;
      background: #f1f3f6;
      box-shadow: 0 16px 36px rgba(20, 24, 28, 0.18), 0 0 0 3px rgba(20, 24, 28, 0.08);
    }

    .slot-row[draggable="true"] {
      cursor: grab;
    }

    .slot-row[draggable="true"]:active {
      cursor: grabbing;
    }

    .slot-row.dragging {
      opacity: 0.56;
      transform: scale(0.99);
    }

    .slot-index {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(180deg, #2a3138 0%, #15181c 100%);
      font-weight: 700;
      font-size: 12px;
    }

    .slot-size {
      display: none;
    }

    .drag-handle {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background:
        radial-gradient(circle, var(--line-strong) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
      opacity: 0;
      transition: opacity 0.18s ease, background 0.18s ease;
    }

    .slot-row[draggable="true"] .drag-handle {
      opacity: 1;
    }

    .slot-row.active .drag-handle {
      background:
        radial-gradient(circle, var(--accent) 1.4px, transparent 1.6px) 2px 2px / 7px 7px;
    }


    .preview {
      display: grid;
      place-items: start center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.3)),
        linear-gradient(90deg, rgba(21, 24, 28, 0.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(21, 24, 28, 0.04) 1px, transparent 1px);
      background-size: auto, 18px 18px, 18px 18px;
      border: 0;
      border-radius: 0;
      padding: 12px 8px;
      height: var(--column-height);
      min-height: 0;
      max-height: var(--column-height);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.58);
    }

    .module {
      position: relative;
      width: min(130px, 13vw);
      min-width: 88px;
      justify-self: center;
      --focus-x: 50%;
      --focus-y: 50%;
      --focus-scale: 1;
    }

    .module img {
      width: 100%;
      max-height: calc(var(--column-height) - 16px);
      display: block;
      object-fit: contain;
      object-position: top center;
      filter: drop-shadow(0 22px 36px rgba(0, 0, 0, 0.18));
      transform: scale(var(--focus-scale));
      transform-origin: var(--focus-x) var(--focus-y);
      transition: transform 0.24s ease, transform-origin 0.24s ease, filter 0.24s ease;
    }

    .module.focusing img {
      filter: drop-shadow(0 26px 42px rgba(0, 0, 0, 0.24));
    }

    .selected-title {
      display: grid;
      gap: 6px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .selected-title h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
    }

    .selected-title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      color: var(--muted);
      background: #fafbfc;
    }

    .chip.live {
      color: var(--accent);
      border-color: rgba(63, 70, 78, 0.42);
      background: var(--accent-soft);
    }

    .function-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .function-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 12px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      align-items: start;
      overflow: visible;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .function-row:hover,
    .function-row:focus-within {
      border-color: rgba(63, 70, 78, 0.55);
      background: #fff;
      box-shadow: inset 3px 0 0 var(--accent), 0 8px 22px rgba(63, 70, 78, 0.1);
      transform: translateX(8px);
    }

    .function-row::before {
      content: "\2190";
      position: absolute;
      top: -1px;
      left: 0;
      display: grid;
      place-items: center;
      width: 30px;
      height: calc(100%);
      border: 1px solid rgba(21, 24, 28, 0.92);
      border-radius: 10px 0 0 10px;
      background: linear-gradient(180deg, #2c3137 0%, #111418 100%);
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 12px 28px rgba(20, 24, 28, 0.22);
      opacity: 0;
      z-index: -1;
      transform: translate(0, 0);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.22s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .function-row:hover::before,
    .function-row:focus-within::before {
      opacity: 1;
      transform: translate(-18px, 0);
      border-color: rgba(21, 24, 28, 1);
      box-shadow: 0 16px 34px rgba(20, 24, 28, 0.28);
    }

    .function-row b {
      width: fit-content;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      margin-left: 10px;
      background: #fff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #404750;
    }

    .function-row span {
      color: #30353b;
      line-height: 1.45;
      font-size: 14px;
    }

    @media (max-width: 1180px) {
      .slot-bar {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .slot-usage {
        grid-column: 2;
      }

      .slot-trash {
        grid-column: 3;
        grid-row: 1 / span 2;
      }
    }

    @media (max-width: 1120px) {
      .main {
        grid-template-columns: minmax(280px, 1fr) minmax(96px, 126px);
      }

      .details {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .main,
      .slot-bar {
        width: 100%;
      }

      .workspace {
        grid-template-rows: auto auto 1fr;
      }

      .slot-bar {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        padding: 12px;
      }

      .slot-bar h2 {
        grid-column: 1;
        grid-row: auto;
      }

      .slot-usage {
        grid-column: 1;
        grid-row: auto;
      }

      .slot-trash {
        grid-column: 1;
        grid-row: auto;
        min-height: 48px;
      }

      .slots {
        grid-column: 1;
        grid-row: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        height: auto;
        min-height: 64px;
        align-items: flex-start;
        padding: 12px;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
      }

      .device-switch {
        width: 100%;
      }

      .device-switch button {
        flex: 1;
      }

      .main {
        grid-template-columns: 1fr;
        padding: 14px 12px 18px;
      }

      .module {
        width: min(132px, 38vw);
        margin: 0 auto;
      }

      .panel,
      .preview {
        height: auto;
        min-height: auto;
        max-height: none;
      }

      .module img {
        max-height: 320px;
      }

      .function-row {
        grid-template-columns: 76px minmax(0, 1fr);
      }
    }

    @media (max-width: 520px) {
      .brand h1 {
        white-space: normal;
      }

      .slot-usage {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .usage-label {
        white-space: normal;
      }

      .slots {
        grid-template-columns: 1fr;
      }

      .slot-row {
        grid-template-columns: 28px minmax(0, 1fr) 18px;
      }

      .selected-title h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="workspace" id="workspace">
      <header class="topbar">
        <div class="brand">
          <img class="mark" src="../images/Pico_Icon.jpg" alt="" aria-hidden="true">
          <div>
            <h1>Pico Eurorack Interface</h1>
            <span id="deviceSubtitle">Pico</span>
          </div>
        </div>
        <div class="top-actions">
          <div class="device-switch" aria-label="Device Switch">
            <button type="button" data-device="pico">Pico</button>
            <button type="button" data-device="picofx">PicoFX</button>
          </div>
        </div>
      </header>

      <section class="slot-bar" aria-label="Bootloader app slots">
        <h2>Slots</h2>
        <div class="slots" id="slots"></div>
        <div class="slot-usage" aria-label="Firmware capacity usage">
          <div class="usage-track" aria-hidden="true">
            <div class="usage-fill" id="usageFill"></div>
          </div>
          <span class="usage-label" id="usageLabel">0KB / 4MB · 0%</span>
        </div>
        <div class="slot-trash" id="slotTrash" aria-label="Drop slot here to delete">
          <span>Delete</span>
        </div>
      </section>

      <main class="main">
        <aside class="panel">
          <div class="panel-head">
            <h2>App Catalog</h2>
            <span class="chip" id="catalogCount"></span>
          </div>
          <div class="panel-body">
            <input class="catalog-search" id="search" type="search" placeholder="Search App">
            <div class="app-list" id="appList"></div>
          </div>
        </aside>

        <section class="preview">
          <div class="module">
            <img id="panelImage" src="../images/Pico_2D.png" alt="Pico panel preview">
          </div>
        </section>

        <aside class="panel details">
          <div class="panel-body">
            <div class="selected-title">
              <h2 id="selectedName">TripleOSC</h2>
              <p id="selectedDescription"></p>
            </div>
            <div class="page-tabs" id="pageTabs"></div>
            <div class="function-list" id="functionList"></div>
          </div>
        </aside>
      </main>
    </section>
  </div>

  <script>
    const DATA = {
      pico: {
        label: "Pico",
        image: "../images/Pico_2D.png",
        apps: [
          app("TripleOSC", "Three oscillator voice", [
            page("RED", ["Waveform: Sine / Triangle / Saw / Ramp", "Oscillator 1 tuning", "Oscillator 2 tuning", "Oscillator 3 tuning"])
          ], io("Gate / pitch workflow", "Trigger input", "Not used", "Audio out", "Page button selects parameter page")),
          app("Plaits", "Mutable Plaits macro oscillator", [
            page("Model", ["Pitch +/- 12 semitones", "Harmonics", "Timbre", "Morph"]),
            page("Hold", ["Octave -3 to +5", "Main / Aux output mix", "LPG response", "LPG time / decay"])
          ], io("V/Oct pitch input", "Trigger input", "Plaits aux blend source", "Audio out", "Click model, double click bank, hold page 2")),
          app("PlaitsFM", "Six-op FM voice", [
            page("Bank", ["Pitch +/- 12 semitones", "Patch number", "Timbre / operator feedback", "Morph / decay character"]),
            page("Hold", ["Octave -3 to +5", "Unassigned", "Unassigned", "Unassigned"])
          ], io("V/Oct pitch input", "Trigger input", "Not used", "Audio out", "Click patch bank, hold page 2")),
          app("Rings", "Modal resonator voice", [
            page("RED", ["Position", "Structure", "Brightness", "Frequency"]),
            page("VIOLET", ["Position", "Slide", "Polyphony", "Resonator type"])
          ], io("Pitch CV input", "Trigger input", "Not used", "Audio out", "Short click page, hold 3s saves settings")),
          app("Braids", "Braids macro oscillator", [
            page("RED", ["Braids model", "Timbre", "Color", "Frequency"]),
            page("GREEN", ["Attack", "Decay", "Sustain", "Release"])
          ], io("CV input", "Gate / trigger input", "Not used", "Audio output", "Press to move between pages")),
          app("Moogvoice", "Three oscillator subtractive voice", [
            page("RED", ["Oscillator 1 tuning", "Oscillator 2 tuning", "Oscillator 3 tuning", "Waveform"]),
            page("ORANGE", ["Filter frequency", "Filter resonance", "Envelope to filter depth", "LFO to filter depth"]),
            page("GREEN", ["Attack", "Decay", "Sustain", "Release"]),
            page("BLUE", ["LFO frequency", "LFO waveform", "Unassigned", "Unassigned"])
          ], io("Pitch CV input", "Gate / trigger input", "Not used", "Audio output", "Button changes pages")),
          app("DRUMS", "One-knob drum voice set", [
            page("Model", ["Output level", "Tone", "Decay", "Frequency"])
          ], io("Decay CV input", "Trigger input", "Not used", "Audio output", "Button selects drum model")),
          app("Branches", "Bernoulli gate router", [
            page("Primary", ["Probability", "Output level 0-5V", "Unused", "Unused"])
          ], io("Trigger input", "Trigger input", "Red output", "Green output", "Short press mode, long press output type")),
          app("DualClock", "Dual clock generator", [
            page("CLOCK", ["Clock 1 tempo / divider", "Clock 2 tempo / ratio", "Clock 1 swing", "Clock 2 random timing"])
          ], io("External clock input", "Clock input", "Clock 1 output", "Clock 2 output", "Tap tempo, hold 3s sync mode")),
          app("16Step Sequencer", "Pitch and gate sequencer", [
            page("Steps 1-4", ["Step 1 pitch", "Step 2 pitch", "Step 3 pitch", "Step 4 pitch"]),
            page("Steps 5-8", ["Step 5 pitch", "Step 6 pitch", "Step 7 pitch", "Step 8 pitch"]),
            page("Steps 9-12", ["Step 9 pitch", "Step 10 pitch", "Step 11 pitch", "Step 12 pitch"]),
            page("Steps 13-16", ["Step 13 pitch", "Step 14 pitch", "Step 15 pitch", "Step 16 pitch"]),
            page("Global", ["Scale", "Clock divider", "Steps 1-16", "Overall pitch"])
          ], io("Clock input", "Clock input", "Gate output", "Pitch CV output", "Short press pages, hold ratchet edit")),
          app("Motion Recorder", "Two-channel CV motion recorder", [
            page("Motion", ["Manual CV motion ch2", "Manual CV motion ch1", "Sequence length", "Motion smoothing"])
          ], io("Clock input", "Clock input", "CV out 1", "CV out 2", "Press to start a new recording")),
          app("Grids Sampler", "Four-channel Grids sample sequencer", [
            page("RED", ["Drum Map X", "Drum Map Y", "Chaos", "Random sample chance ch4"]),
            page("GREEN", ["Channel 1 fill", "Channel 2 fill", "Channel 3 fill", "Channel 4 fill"]),
            page("AQUA", ["Channel 1 sample", "Channel 2 sample", "Channel 3 sample", "Channel 4 sample"])
          ], io("Reset input", "Clock input", "Not used", "Audio out", "Button changes page")),
          app("DejaVu", "Generative CV sequencer", [
            page("RED", ["Gate density", "Probability of changing gates", "Note range", "DejaVu repeat memory"]),
            page("GREEN", ["Unassigned", "Unassigned", "Unassigned", "CV offset"])
          ], io("Clock input", "Clock input", "Gate output", "CV output", "Click to advance page")),
          app("Modulation", "ADSR / LFO modulation source", [
            page("ADSR", ["Attack", "Decay", "Sustain", "Release"]),
            page("LFO", ["Rise", "Fall", "Waveform", "Output level"])
          ], io("Gate or sync input", "Gate / sync", "CV output", "CV output", "Short press toggles ADSR/LFO")),
          app("Oneshot Sampler", "One-shot sample player", [
            page("GREEN", ["Level", "Tone / lowpass brightness", "CV input target", "Pitch"]),
            page("AQUA", ["Start point", "End point", "Attack", "Decay / hold"]),
            page("BLUE", ["Bank selection", "Sample selection", "Sample randomness", "Reverse"])
          ], io("CV input target selectable", "Trigger input", "Not used", "Audio out", "Button switches pages"))
        ]
      },
      picofx: {
        label: "PicoFX",
        image: "../images/PicoFX_2D.png",
        apps: [
          app("DaisySP Delay", "Mono / ping-pong delay", [
            page("RED", ["Delay time", "Feedback", "Wet / dry blend", "Output level"])
          ], io("Audio input", "Mono clock input or right audio out", "Right out / clock role", "Left / mono out", "Button toggles mono/ping-pong")),
          app("DaisySP Reverb", "Stereo reverb", [
            page("RED", ["Reverb time", "Filter cutoff", "Wet / dry blend", "Output level"])
          ], io("Audio input", "Audio / CV input", "Right audio out", "Left audio out", "Single page")),
          app("DaisySP Chorus", "Chorus modulation", [
            page("RED", ["Delay", "Feedback", "LFO frequency", "LFO depth"]),
            page("GREEN", ["Wet / dry mix", "Output level", "Unassigned", "Unassigned"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Button changes page")),
          app("DaisySP Flanger", "Stereo flanger", [
            page("RED", ["Delay", "Feedback", "LFO frequency", "LFO depth"]),
            page("GREEN", ["Wet / dry mix", "Output level", "Stereo width", "LFO waveform"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Button changes page")),
          app("DaisySP Pitchshifter", "Delay-line pitch shifter", [
            page("RED", ["Delay size", "Transposition", "Random modulation", "Wet / dry mix"])
          ], io("Audio input", "Audio input / CV", "Right audio out", "Left audio out", "Single page")),
          app("Ladderfilter", "CV-scaled ladder filter", [
            page("RED", ["Filter resonance", "Initial frequency", "CV scale 0-1.5x", "Output level"])
          ], io("Frequency CV input", "Audio input", "Not used", "Audio out", "Single page")),
          app("Bitcrush", "Resolution and downsampling effect", [
            page("GREEN", ["Resolution 1-16 bit", "Downsampling 1x-20x", "Mix", "Output level"])
          ], io("Mix CV input", "Audio input", "Not used", "Audio out", "Button switches page")),
          app("Granular", "Granular texture processor", [
            page("RED", ["Grain size", "Grain density", "Grain pitch", "Wet / dry mix"])
          ], io("Audio input", "Audio input / CV", "Right audio out", "Left audio out", "Single page")),
          app("BeatBreaker", "Clock-sliced beat repeater", [
            page("RED", ["Break probability", "Reverse probability", "Repeat macro", "Output level"])
          ], io("Clock input", "Audio input", "Not used", "Audio out", "Button clears beat history")),
          app("Sidechain", "Trigger ducking processor", [
            page("RED", ["Attack", "Decay", "Knee curve", "Output level"])
          ], io("Trigger input", "Audio input", "Not used", "Audio out", "Trigger input ducks audio")),
          app("Panner", "Stereo spreader / panner", [
            page("SPREAD", ["Width", "Rate", "Delay / LFO shape", "Output level"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Single page")),
          app("Spectral Smash", "Freeze / tear spectral processor", [
            page("SPECTRAL", ["Warp / tear", "Blur", "Time smear", "Wet / dry mix"])
          ], io("Audio input", "Audio input / right out", "Right audio out", "Left audio out", "Short press freeze, hold recaptures"))
        ]
      }
    };

    function app(name, description, pages, hardware) {
      return { name, description, pages, hardware };
    }

    function page(name, params) {
      return { name, params };
    }

    function io(cv, input, aux, out, button) {
      return { cv, input, aux, out, button };
    }

    const state = {
      device: "pico",
      selectedApp: 0,
      selectedPage: 0,
      selectedSlot: 0,
      slots: ["TripleOSC", "Branches", "", "", "", ""]
    };

    const appList = document.getElementById("appList");
    const search = document.getElementById("search");
    const pageTabs = document.getElementById("pageTabs");
    const slots = document.getElementById("slots");
    const usageFill = document.getElementById("usageFill");
    const usageLabel = document.getElementById("usageLabel");
    const slotTrash = document.getElementById("slotTrash");
    const functionList = document.getElementById("functionList");
    const modulePreview = document.querySelector(".module");
    const DRAG_TYPE = {
      app: "application/x-app-index",
      slot: "application/x-slot-index"
    };
    const SLOT_SIZE_KB = 512;
    const TOTAL_SIZE_KB = 4096;
    const PANEL_FOCUS = {
      IN: { x: "50%", y: "17%", scale: 2.4 },
      PAGE: { x: "50%", y: "27%", scale: 2.35 },
      "PARAM 1": { x: "50%", y: "38%", scale: 2.25 },
      "PARAM 2": { x: "50%", y: "49%", scale: 2.25 },
      "PARAM 3": { x: "50%", y: "60%", scale: 2.25 },
      "PARAM 4": { x: "50%", y: "71%", scale: 2.25 },
      AUX: { x: "50%", y: "84%", scale: 2.35 },
      OUT: { x: "50%", y: "91%", scale: 2.35 }
    };

    document.querySelectorAll("[data-device]").forEach((button) => {
      button.addEventListener("click", () => {
        state.device = button.dataset.device;
        state.selectedApp = 0;
        state.selectedPage = 0;
        resetDeviceDefaults();
        render();
      });
    });

    search.addEventListener("input", () => renderAppList());

    function resetDeviceDefaults() {
      state.selectedSlot = 0;
      state.slots = state.device === "pico"
        ? ["TripleOSC", "Branches", "", "", "", ""]
        : ["DaisySP Delay", "Bitcrush", "", "", "", ""];
    }

    function currentDevice() {
      return DATA[state.device];
    }

    function currentApp() {
      return currentDevice().apps[state.selectedApp];
    }

    function currentPage() {
      const appData = currentApp();
      return appData.pages[Math.min(state.selectedPage, appData.pages.length - 1)];
    }

    function render() {
      const device = currentDevice();
      document.getElementById("panelImage").src = device.image;
      document.getElementById("panelImage").alt = `${device.label} panel preview`;
      document.getElementById("deviceSubtitle").textContent = device.label;
      document.querySelectorAll("[data-device]").forEach((button) => {
        button.classList.toggle("active", button.dataset.device === state.device);
      });
      renderAppList();
      renderSlots();
      renderDetails();
    }

    function renderAppList() {
      const needle = search.value.trim().toLowerCase();
      const apps = currentDevice().apps;
      document.getElementById("catalogCount").textContent = `${apps.length} apps`;
      appList.innerHTML = "";
      let visibleCount = 0;
      apps.forEach((item, index) => {
        const haystack = `${item.name} ${item.description} ${item.pages.map((p) => p.params.join(" ")).join(" ")}`.toLowerCase();
        if (needle && !haystack.includes(needle)) return;
        visibleCount += 1;
        const button = document.createElement("button");
        button.type = "button";
        button.className = `app-card${index === state.selectedApp ? " active" : ""}`;
        button.draggable = true;
        button.innerHTML = `<strong>${item.name}</strong><span>${item.description}</span>`;
        button.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData(DRAG_TYPE.app, String(index));
          event.dataTransfer.effectAllowed = "copy";
          beginDrag("app", button);
        });
        button.addEventListener("dragend", () => {
          clearDragState();
        });
        button.addEventListener("click", () => {
          state.selectedApp = index;
          state.selectedPage = 0;
          renderAppList();
          renderDetails();
        });
        appList.appendChild(button);
      });
      if (!visibleCount) {
        appList.innerHTML = `<div class="empty-state">No apps match this search.</div>`;
      }
    }

    function renderSlots() {
      slots.innerHTML = "";
      state.slots.forEach((name, index) => {
        const row = document.createElement("div");
        row.className = `slot-row${index === state.selectedSlot ? " active" : ""}`;
        row.draggable = Boolean(name);
        row.innerHTML = `
          <div class="slot-index ${name ? "" : "empty"}">${index + 1}</div>
          <strong class="${name ? "" : "slot-empty"}">${name || "Empty"}</strong>
          <span class="drag-handle" aria-hidden="true"></span>
          <span class="slot-size">${name ? "512KB" : "0KB"}</span>
        `;
        row.addEventListener("dragstart", (event) => {
          if (!name) {
            event.preventDefault();
            return;
          }
          event.dataTransfer.setData(DRAG_TYPE.slot, String(index));
          event.dataTransfer.effectAllowed = "move";
          beginDrag("slot", row);
        });
        row.addEventListener("dragend", () => {
          clearDragState();
        });
        row.addEventListener("dragover", (event) => {
          const dragKind = getDragKind(event);
          if (!dragKind) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = dragKind === "slot" ? "move" : "copy";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", () => {
          row.classList.remove("drag-over");
        });
        row.addEventListener("drop", (event) => {
          const dragKind = getDragKind(event);
          if (!dragKind) return;
          event.preventDefault();
          row.classList.remove("drag-over");
          dragKind === "slot" ? swapSlotFromDrag(event, index) : assignAppFromDrag(event, index);
        });
        row.addEventListener("click", () => {
          state.selectedSlot = index;
          selectAppByName(name);
          renderAllSlotsAndDetails();
        });
        slots.appendChild(row);
      });
      renderCapacityUsage();
    }

    function assignAppFromDrag(event, slotIndex) {
      const appIndex = Number(event.dataTransfer.getData(DRAG_TYPE.app));
      const appData = currentDevice().apps[appIndex];
      if (!appData) {
        clearDragState();
        return;
      }
      state.selectedSlot = slotIndex;
      state.selectedApp = appIndex;
      state.selectedPage = 0;
      state.slots[slotIndex] = appData.name;
      clearDragState();
      renderAllSlotsAndDetails();
    }

    function swapSlotFromDrag(event, targetIndex) {
      const sourceIndex = Number(event.dataTransfer.getData(DRAG_TYPE.slot));
      if (!Number.isInteger(sourceIndex) || sourceIndex === targetIndex) {
        clearDragState();
        return;
      }
      [state.slots[sourceIndex], state.slots[targetIndex]] = [state.slots[targetIndex], state.slots[sourceIndex]];
      state.selectedSlot = targetIndex;
      selectAppByName(state.slots[targetIndex]);
      clearDragState();
      renderAllSlotsAndDetails();
    }

    function renderAllSlotsAndDetails() {
      renderSlots();
      renderAppList();
      renderDetails();
    }

    function selectAppByName(name) {
      const appIndex = currentDevice().apps.findIndex((item) => item.name === name);
      if (appIndex < 0) return;
      state.selectedApp = appIndex;
      state.selectedPage = 0;
    }

    function beginDrag(kind, element) {
      clearDragState();
      element.classList.add("dragging");
      document.body.classList.add(`${kind}-dragging`);
    }

    function getDragKind(event) {
      if (hasDragType(event, DRAG_TYPE.slot)) return "slot";
      if (hasDragType(event, DRAG_TYPE.app)) return "app";
      return "";
    }

    function hasDragType(event, type) {
      return Array.from(event.dataTransfer.types).includes(type);
    }

    function clearDragState() {
      document.body.classList.remove("app-dragging");
      document.body.classList.remove("slot-dragging");
      document.querySelectorAll(".app-card.dragging").forEach((card) => {
        card.classList.remove("dragging");
      });
      document.querySelectorAll(".slot-row.dragging").forEach((row) => {
        row.classList.remove("dragging");
      });
      document.querySelectorAll(".slot-row.drag-over").forEach((row) => {
        row.classList.remove("drag-over");
      });
      slotTrash.classList.remove("drag-over");
    }

    slotTrash.addEventListener("dragover", (event) => {
      if (!hasDragType(event, DRAG_TYPE.slot)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      slotTrash.classList.add("drag-over");
    });

    slotTrash.addEventListener("dragleave", () => {
      slotTrash.classList.remove("drag-over");
    });

    slotTrash.addEventListener("drop", (event) => {
      event.preventDefault();
      slotTrash.classList.remove("drag-over");
      const slotIndex = Number(event.dataTransfer.getData(DRAG_TYPE.slot));
      if (!Number.isInteger(slotIndex) || !state.slots[slotIndex]) {
        clearDragState();
        return;
      }
      state.slots[slotIndex] = "";
      state.selectedSlot = slotIndex;
      clearDragState();
      renderAllSlotsAndDetails();
    });

    function renderCapacityUsage() {
      const usedKb = state.slots.filter(Boolean).length * SLOT_SIZE_KB;
      const percent = Math.round((usedKb / TOTAL_SIZE_KB) * 100);
      usageFill.style.width = `${percent}%`;
      usageLabel.textContent = `${formatCapacity(usedKb)} / 4MB · ${percent}%`;
    }

    function formatCapacity(kb) {
      return kb >= 1024 ? `${Number((kb / 1024).toFixed(1))}MB` : `${kb}KB`;
    }

    function renderDetails() {
      const appData = currentApp();
      const pageData = currentPage();
      document.getElementById("selectedName").textContent = appData.name;
      document.getElementById("selectedDescription").textContent = appData.description;
      pageTabs.innerHTML = "";
      appData.pages.forEach((pageItem, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = pageItem.name;
        button.classList.toggle("active", index === state.selectedPage);
        button.addEventListener("click", () => {
          state.selectedPage = index;
          renderDetails();
        });
        pageTabs.appendChild(button);
      });

      const rows = [
        ["IN", appData.hardware.input],
        ["PAGE", appData.hardware.button],
        ["PARAM 1", pageData.params[0]],
        ["PARAM 2", pageData.params[1]],
        ["PARAM 3", pageData.params[2]],
        ["PARAM 4", pageData.params[3]],
        ["AUX", appData.hardware.cv],
        ["OUT", appData.hardware.out]
      ];
      functionList.innerHTML = rows.map(([label, value]) => `
        <div class="function-row" data-focus="${label}" tabindex="0"><b>${label}</b><span>${value || "Not used / TBD"}</span></div>
      `).join("");
      bindFunctionFocus();
    }

    function bindFunctionFocus() {
      functionList.querySelectorAll(".function-row").forEach((row) => {
        row.addEventListener("mouseenter", () => focusPanelControl(row.dataset.focus));
        row.addEventListener("focusin", () => focusPanelControl(row.dataset.focus));
        row.addEventListener("mouseleave", clearPanelFocus);
        row.addEventListener("focusout", clearPanelFocus);
      });
    }

    function focusPanelControl(label) {
      const target = PANEL_FOCUS[label];
      if (!target) return;
      modulePreview.classList.add("focusing");
      modulePreview.style.setProperty("--focus-x", target.x);
      modulePreview.style.setProperty("--focus-y", target.y);
      modulePreview.style.setProperty("--focus-scale", target.scale);
    }

    function clearPanelFocus() {
      modulePreview.classList.remove("focusing");
      modulePreview.style.setProperty("--focus-scale", 1);
    }

    render();
  </script>
</body>
</html>
