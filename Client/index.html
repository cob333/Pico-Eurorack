<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico-Eurorack Client</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <section class="workspace" id="workspace">
      <header class="topbar">
        <div class="brand">
          <img class="mark" src="../images/Pico_Icon.jpg" alt="" aria-hidden="true">
          <div>
            <h1>Workshop</h1>
          </div>
        </div>
        <div class="top-actions">
          <span class="status-chip" id="generationStatus">Local mode</span>
          <button class="generate-button blocked" id="generateButton" type="button" disabled>Generate</button>
          <div class="device-switch" aria-label="Device Switch">
            <button type="button" data-device="pico">Pico</button>
            <button type="button" data-device="picofx">PicoFX</button>
          </div>
        </div>
      </header>

      <section class="slot-bar" aria-label="Bootloader app slots">
        <h2>Slots</h2>
        <div class="slots" id="slots"></div>
        <div class="slot-usage" aria-label="Firmware capacity usage">
          <div class="usage-track" aria-hidden="true">
            <div class="usage-fill" id="usageFill"></div>
          </div>
          <span class="usage-label" id="usageLabel">0KB / 3.5MB</span>
        </div>
        <div class="slot-actions" aria-label="Slot actions">
          <div class="slot-trash" id="slotTrash" aria-label="Drop slot here to delete">
            <span class="slot-trash-label">Delete</span>
          </div>
          <div class="slot-clear">
            <button class="slot-clear-all" id="clearAllSlots" type="button">Clear all</button>
          </div>
        </div>
      </section>

      <main class="main">
        <aside class="panel">
          <div class="panel-head">
            <h2>App Catalog</h2>
            <span class="chip" id="catalogCount"></span>
          </div>
          <div class="panel-body">
            <input class="catalog-search" id="search" type="search" placeholder="Search App">
            <div class="app-list" id="appList"></div>
          </div>
        </aside>

        <section class="preview">
          <div class="module">
            <img id="panelImage" src="../images/Pico_2D.png" alt="Pico panel preview">
          </div>
        </section>

        <aside class="panel details">
          <div class="panel-body">
            <div class="selected-title">
              <div class="selected-title-row">
                <h2 id="selectedName">TripleOSC</h2>
                <div id="selectedInfoMount"></div>
              </div>
              <p id="selectedDescription"></p>
            </div>
            <div class="page-tabs" id="pageTabs"></div>
            <div class="function-list" id="functionList"></div>
          </div>
        </aside>
      </main>
    </section>
    <div class="footer-reveal-space" id="footerRevealSpace" aria-hidden="true"></div>
    <footer class="site-footer">
      <span>This client is built upon https://github.com/rheslip/2HPico-Eurorack-Module-Hardware.</span>
      <span>Original author: Rich Heslip</span>
      <img src="../images/fm.synth.jpg" alt="by fm.synth">
    </footer>
    <div class="build-overlay" id="buildOverlay" aria-live="polite" aria-label="Build progress">
      <div class="build-progress">
        <div class="build-progress-head">
          <strong id="buildProgressMessage">Building</strong>
          <span id="buildProgressPercent">0%</span>
        </div>
        <div class="build-progress-row">
          <div class="build-progress-track" aria-hidden="true">
            <div class="build-progress-fill" id="buildProgressFill"></div>
          </div>
          <button class="build-cancel" id="buildCancel" type="button" aria-label="Cancel build">&times;</button>
        </div>
      </div>
    </div>
    <div class="sample-modal" id="sampleModal" aria-hidden="true">
      <div class="sample-dialog" role="dialog" aria-modal="true" aria-labelledby="sampleTitle">
        <div class="sample-dialog-head">
          <div>
            <h2 id="sampleTitle">Samples</h2>
            <p id="sampleSubtitle"></p>
          </div>
          <button class="sample-close" id="sampleClose" type="button" aria-label="Close samples">&times;</button>
        </div>
        <div class="sample-content">
          <div class="sample-status" id="sampleStatus"></div>
          <div class="sample-bank-list" id="sampleBankList"></div>
        </div>
        <form class="sample-uploader" id="sampleUploadForm">
          <input id="sampleBankName" type="text" placeholder="New Bank" aria-label="New Bank">
          <input id="sampleFiles" type="file" accept=".wav,audio/wav,audio/x-wav" multiple aria-label="WAV files">
          <button class="sample-upload-button" id="sampleUploadButton" type="submit">Upload</button>
        </form>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
